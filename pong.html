<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="pong.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="player-score">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="divider"></div>
            <div class="computer-score">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <p><strong>Controls:</strong> Move mouse up/down or use Arrow Keys to control left paddle</p>
            <p><strong>Goal:</strong> Get the ball past your opponent's paddle to score points!</p>
        </div>
    </div>
    <script src="pong.js"></script>
</body>
</html>
